services:
  - type: web
    name: civicsense-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: civicsense-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://civicsense-gamma.vercel.app
      - key: GROQ_API_KEY
        sync: false   # set manually in Render dashboard

databases:
  - name: civicsense-db
    databaseName: civicsense
    user: civicsense
